name: Build

on:
  push:
    branches: [main, '*-development']
  pull_request:
    branches: [main, '*-development']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn verify --batch-mode -Dsurefire.excludes="**/*IT.java"